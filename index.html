<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Sweet Home Chicago</title>
</head>
<body>
    <!-- HEADER  -->
    <header>
        <div class="logo-area">
            <h1>Sweet Home Chicago</h1>
            <p class="tagline">Exploring the Architecture, History, & Legends of Chicago</p>
        </div>
        <!-- NAV  -->
        <nav class="navbar">
            <button class="menu-btn">✦ Navigation</button>

            <ul class="dropdown-menu">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <!-- MAIN  -->
    <main>
        <div class="hero">
            <h2>Chicago's Carbide & Carbon Building</h2>
            <img src="images/chicago_skyline.jpg" alt="Carbide and Carbon Building in Chicago" width="500">
            <audio id="music">
                <source src="./audio/baronsaiband-my-slow-chicago-blues-song-339298.mp3" type="audio/mpeg" loop>
            </audio>
            <button id="musicBtn">Listen to Chicago Blues</button>
        </div>
        <section class="contact-section">
            <h2>Contact Us</h2>
                <form class="contact-form">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="E.g.,Bill Thompson" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="E.g, bill@gmail.com" required>

                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" cols="40" required></textarea>
                    <button type="submit">Send Message</button>
                </form>
        </section>
    </main>
    <!-- FOOTER  -->        
    <footer class="site-footer">
        <h2>Follow Sweet Home Chicago</h2>
        <ul class="social-links">
            <li><a href="#" aria-label="Visit our Facebook page">Facebook</a></li>
            <li><a href="#" aria-label="Visit our Instagram page">Instagram</a></li>
            <li><a href="#" aria-label="Visit our Tiktok">TikTok</a></li>
        </ul>
        <p>&copy;2026 Sweet Home Chicago. All rights reserved.</p>
    </footer>
    <script src="./script.js"></script>
</body>
</html>
